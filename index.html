 <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige Carry - Boutique de Luxe</title>
  <style>
    :root { --noir: #0a0a0a; --or: #d4af37; --gris: #1f1f1f; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--noir);
      color: #e5e5e5;
      line-height: 1.6;
    }
    header {
      position: fixed; top:0; left:0; right:0;
      background: rgba(10,10,10,0.95);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }
    .logo { font-size: 1.8rem; font-weight: 700; color: var(--or); }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), #000;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5%;
    }
    h1 { font-size: 4.5rem; margin-bottom: 1rem; }
    .btn { background: var(--or); color: black; padding: 16px 45px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 4px; }

    section { padding: 100px 5%; }
    h2 { font-size: 2.8rem; text-align: center; margin-bottom: 3rem; color: var(--or); }

    .products, .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .product-card, .gallery img {
      background: var(--gris);
      border-radius: 12px;
      overflow: hidden;
    }
    .product-card img, .gallery img {
      width: 100%;
      height: 420px;
      object-fit: cover;
    }
    .price { color: var(--or); font-size: 1.7rem; font-weight: 700; margin: 10px 0; }

    .social a {
      color: #ccc;
      font-size: 2rem;
      margin: 0 15px;
      text-decoration: none;
    }
    footer {
      text-align: center;
      padding: 3rem;
      background: #000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">PRESTIGE CARRY</div>
    <nav>
      <a href="#accueil">Accueil</a>
      <a href="#boutique">Boutique</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="accueil" class="hero">
    <div>
      <h1>Prestige Carry</h1>
      <p>L'élégance portée au quotidien</p>
      <button class="btn" onclick="document.getElementById('boutique').scrollIntoView({behavior:'smooth'})">
        Découvrir la collection
      </button>
    </div>
  </section>

  <section id="boutique">
    <h2>Notre Collection</h2>
    <div class="products" id="products"></div>
  </section>

  <section id="galerie" style="background:#111;">
    <h2>Galerie LULUGAO</h2>
    <div class="gallery">
      <img src="https://i.imgur.com/3vK8z9L.jpg" alt="Sac LULUGAO">
      <img src="https://i.imgur.com/2nd-image.jpg" alt="Sac LULUGAO 2"> <!-- Remplace si besoin -->
      <img src="https://i.imgur.com/3rd-image.jpg" alt="Sac LULUGAO 3">
    </div>
  </section>

  <section id="contact" style="background:#111; text-align:center;">
    <h2>Contact & Commande</h2>
    <p>Commandez directement via WhatsApp</p>
    <a href="https://wa.me/2250554983012?text=Bonjour%20Prestige%20Carry%2C%20je%20veux%20le%20Sac%20LULUGAO" 
       class="btn" style="background:#25D366; display:inline-block; margin:20px 0;" target="_blank">
      💬 Commander sur WhatsApp
    </a>
  </section>

  <footer>
    <p>Suivez-nous</p>
    <div class="social">
      <a href="#" target="_blank">📸 Instagram</a>
      <a href="#" target="_blank">📘 Facebook</a>
      <a href="#" target="_blank">🐦 X</a>
    </div>
    <p style="margin-top:30px;">© 2026 Prestige Carry - Tous droits réservés</p>
  </footer>

  <script>
    const products = [{
      name: "Sac à Dos LULUGAO",
      price: "10.000 FCFA",
      image: "https://i.imgur.com/3vK8z9L.jpg"
    }];

    const container = document.getElementById('products');
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img src="\( {p.image}" alt=" \){p.name}">
        <div class="product-info" style="padding:1.5rem; text-align:center;">
          <h3>${p.name}</h3>
          <div class="price">${p.price}</div>
          <button class="btn" onclick="window.open('https://wa.me/2250554983012?text=Bonjour%2C%20je%20veux%20le%20Sac%20%C3%A0%20Dos%20LULUGAO%20%C3%A0%2010.000%20FCFA', '_blank')">
            Commander via WhatsApp
          </button>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
