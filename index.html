<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige Carry - Boutique de Luxe</title>
  <style>
    :root {
      --noir: #0a0a0a;
      --or: #d4af37;
      --gris: #1f1f1f;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--noir);
      color: #e5e5e5;
    }
    header {
      position: fixed; top:0; left:0; right:0;
      background: rgba(10,10,10,0.95);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      z-index: 100;
    }
    .logo { font-size: 1.8rem; font-weight: bold; color: var(--or); }
    .hero {
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5%;
    }
    h1 { font-size: 4rem; margin-bottom: 1rem; }
    .btn {
      background: var(--or);
      color: black;
      padding: 15px 40px;
      border: none;
      font-size: 1.1rem;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">PRESTIGE CARRY</div>
    <nav>
      <a href="#" style="color:white; margin-left:20px;">Accueil</a>
      <a href="#" style="color:white; margin-left:20px;">Boutique</a>
      <a href="#" style="color:white; margin-left:20px;">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h1>Prestige Carry</h1>
      <p>L'elegance portee au quotidien</p>
      <button class="btn">Decouvrir la collection</button>
    </div>
  </section>

</body>
</html>
